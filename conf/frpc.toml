serverAddr = "127.0.0.1"
serverPort = 7000
poolCount = 1

[auth]
token = "change-me"

[transport]
protocol = "tcp"
# protocol = "kcp"
# protocol = "quic"

[[proxies]]
name = "ssh"
type = "tcp"
localIP = "127.0.0.1"
localPort = 22
remotePort = 6000
bandwidthLimit = "10MB"

